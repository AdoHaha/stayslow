<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>stayslow options</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="options-shell">
      <header class="options-header">
        <div>
          <p class="eyebrow">stayslow</p>
          <h1>Slow websites down</h1>
        </div>
        <label class="switch">
          <input id="enabled" type="checkbox">
          <span>Enabled</span>
        </label>
      </header>

      <section class="settings-band">
        <label class="field compact">
          <span>Delay seconds</span>
          <input id="delaySeconds" type="number" min="1" max="300" step="1">
        </label>
        <button id="addSite" type="button">Add site</button>
        <button id="save" type="button" class="primary">Save</button>
      </section>

      <section>
        <div class="list-header">
          <span>Active</span>
          <span>Domain</span>
          <span>Note shown during countdown</span>
          <span></span>
        </div>
        <div id="sites" class="site-list"></div>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>
    <script src="shared.js"></script>
    <script src="options.js"></script>
  </body>
</html>
